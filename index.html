<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #555;
        }
        
        .button {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 5px;
            transition: background 0.3s ease;
        }
        
        .button:hover {
            background: #764ba2;
        }
        
        .links {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome! 👋</h1>
        <p>Hi! I'm <strong>Aman26266-raj</strong></p>
        <p>This is my GitHub Pages portfolio website. I'm passionate about coding and web development.</p>
        
        <div class="links">
            <a href="https://github.com/Aman26266-raj" class="button">GitHub Profile</a>
            <a href="#contact" class="button">Contact Me</a>
        </div>
        
        <hr style="margin: 30px 0; border: none; border-top: 1px solid #ddd;">
        
        <h2 style="color: #667eea; margin: 20px 0;">About Me</h2>
        <p>I love building web applications and exploring new technologies. This is my space to showcase my projects and ideas.</p>
    </div>
</body>
</html>
